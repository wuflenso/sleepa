version: '3'
services:
  mysql-dev:
    image: mysql:9.1.0
    restart: always
    ports:
      - 3307:3306
    environment:
      MYSQL_DATABASE: sleepa_dev
      MYSQL_USER: sleepa
      MYSQL_PASSWORD: sleepa
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-dev-data:/var/lib/mysql
  
  mysql-test:
    image: mysql:9.1.0
    restart: always
    ports:
      - 3308:3306
    environment:
      MYSQL_DATABASE: sleepa_test
      MYSQL_USER: sleepa
      MYSQL_PASSWORD: sleepa
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-test-data:/var/lib/mysql

  redis-dev:
    image: redis:7.4.2
    ports:
      - 6380:6379
    restart: always
 
volumes:
  mysql-dev-data:
  mysql-test-data:
