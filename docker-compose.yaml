version: '3'
services:
  mysql:
    image: mysql:9.1.0
    restart: always
    ports:
      - 3307:3306
    environment:
      MYSQL_DATABASE: sleepa_test
      MYSQL_USER: sleepa
      MYSQL_PASSWORD: sleepa
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4.2
    ports:
      - 6380:6379
    restart: always

  elasticsearch:
    image: elasticsearch:8.16.2
    environment:
      - ELASTIC_PASSWORD=sleepa
      - KIBANA_PASSWORD=sleepa
      - STACK_VERSION=8.16.2
      - ES_PORT=127.0.0.1:9200
    ports:
      - 9201:9200
    restart: always
 
volumes:
  mysql-data: